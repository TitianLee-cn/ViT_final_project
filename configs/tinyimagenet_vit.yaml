dataset: tiny-imagenet
model: vit
image_size: 64
patch_size: 8
num_classes: 200
vit_dim: 384
vit_depth: 8
vit_heads: 8
random_crop: true
horizontal_flip: true
randaugment: true
dropout: 0.1
attention_dropout: 0.1
drop_path_rate: 0.1
label_smoothing: 0.1
weight_decay: 0.05
optimizer: adamw
scheduler: cosine
epochs: 100
batch_size: 128
lr: 0.0003
