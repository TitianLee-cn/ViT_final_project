dataset: cifar10
model: hybrid
cnn_depth: 18
hybrid_stage: layer3
hybrid_freeze_cnn: false
hybrid_patch_size: 1
vit_dim: 256
vit_depth: 4
vit_heads: 8
vit_mlp_ratio: 4.0
random_crop: true
horizontal_flip: true
dropout: 0.1
attention_dropout: 0.1
drop_path_rate: 0.1
label_smoothing: 0.1
weight_decay: 0.05
optimizer: adamw
scheduler: cosine
epochs: 100
batch_size: 128
lr: 0.0003
