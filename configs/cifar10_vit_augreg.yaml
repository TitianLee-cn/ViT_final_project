dataset: cifar10
model: vit
patch_size: 4
vit_dim: 256
vit_depth: 6
vit_heads: 8
vit_mlp_ratio: 4.0
random_crop: true
horizontal_flip: true
randaugment: true
ra_num_ops: 2
ra_magnitude: 9
mixup_alpha: 0.2
cutmix_alpha: 1.0
dropout: 0.1
attention_dropout: 0.1
drop_path_rate: 0.1
label_smoothing: 0.1
weight_decay: 0.05
optimizer: adamw
scheduler: cosine
epochs: 100
batch_size: 128
lr: 0.0003
